name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe, and what did you expect instead?
      placeholder: I ran ... and expected ... but got ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      render: shell
      placeholder: |
        uv run cckg ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD`, or the release tag.
    validations:
      required: false
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: false
  - type: textarea
    id: data-provenance
    attributes:
      label: Data provenance (if a data discrepancy)
      description: >
        For issues with connectivity or anatomy data, paste the relevant
        `MANIFEST.md` provenance so the source snapshot is unambiguous.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
    validations:
      required: false
